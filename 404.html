<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — 021 Marketing</title>
    <meta name="description" content="The page you're looking for doesn't exist.">
    <link rel="icon" type="image/png" href="/logos/021-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --dark: #0A0A0A;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --text: #0A0A0A;
            --text-secondary: #555555;
            --text-muted: #999999;
            --accent: #3B5EFF;
            --accent-hover: #2A4AE0;
            --border: #E0E0E0;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --max-width: 1100px;
        }

        body {
            font-family: var(--font);
            color: var(--text);
            background-color: var(--bg);
            line-height: 1.7;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background: rgba(250,250,250,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 20px 40px;
        }
        .nav-logo {
            text-decoration: none;
        }
        .nav-logo img {
            height: 36px;
            width: 36px;
            display: block;
        }
        .nav-links {
            display: flex;
            gap: 36px;
            align-items: center;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            font-size: 15px;
        }
        .nav-links a:hover { color: var(--accent); }
        .btn-nav {
            background: var(--dark);
            color: var(--white) !important;
            padding: 10px 20px;
            font-weight: 600;
        }
        .btn-nav:hover { background: var(--accent); color: var(--white) !important; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
        }
        .wrap {
            max-width: 640px;
            text-align: center;
        }
        .code {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
        }
        h1 {
            font-size: clamp(40px, 6vw, 64px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
        }
        p {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-primary, .btn-secondary {
            padding: 14px 28px;
            font-weight: 600;
            text-decoration: none;
            font-size: 15px;
            display: inline-block;
        }
        .btn-primary {
            background: var(--dark);
            color: var(--white);
        }
        .btn-primary:hover { background: var(--accent); }
        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { border-color: var(--dark); }

        footer {
            background: var(--dark);
            color: var(--white);
            padding: 40px;
        }
        .footer-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .footer-links {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
        }
        .footer-links a:hover { opacity: 1; color: var(--accent); }
        .footer-meta {
            font-size: 13px;
            opacity: 0.6;
        }

        @media (max-width: 640px) {
            .nav-links li:not(:last-child) { display: none; }
            main { padding: 60px 24px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <a href="/" class="nav-logo"><img src="/logos/021-glyph.png" alt="021 Marketing"></a>
            <ul class="nav-links">
                <li><a href="/case-studies/">Case Studies</a></li>
                <li><a href="/faq/">FAQs</a></li>
                <li><a href="https://calendly.com/emma-021marketing/30min" class="btn-nav">Book a free call</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="wrap">
            <div class="code">Error 404</div>
            <h1>This page took a detour</h1>
            <p>The page you're looking for doesn't exist, or it may have moved. Let's get you back on track.</p>
            <div class="actions">
                <a href="/" class="btn-primary">Back to home</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-links">
                <a href="/case-studies/">Case Studies</a>
                <a href="/faq/">FAQs</a>
                <a href="https://calendly.com/emma-021marketing/30min">Book a Free Call</a>
                <a href="https://www.linkedin.com/in/emmacimolini/" target="_blank" rel="noopener">LinkedIn</a>
            </div>
            <div class="footer-meta">&copy; 2026 021 Marketing</div>
        </div>
    </footer>

</body>
</html>
